name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  build-cmake:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install build dependencies
      run: sudo apt-get install -y cmake ninja-build

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenmpi-dev
        pip install pytest numpy torch

    - name: Set up cache
      uses: actions/cache@v4
      with:
        path: build
        key: cmake_${{ github.event.pull_request.number }}

    - name: Configure CMake
      run: cmake --preset develop -DGINKGO_BUILD_OMP=OFF

    - name: Build with CMake
      run: cmake --build --preset develop -j 2

    - name: Run specific test
      run: ctest --preset develop
  build-pip:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenmpi-dev
        pip install pytest numpy torch build

    - name: Set up cache
      uses: actions/cache@v4
      with:
        path: .py-build-cmake_cache
        key: pip_${{ github.event.pull_request.number }}

    - name: Pip install package
      run: python3 -m build  --config-setting "override=cmake.build_args=[\"-j\",\"2\"]"
