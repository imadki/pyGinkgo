[project]
name = "pyGinkgo"
version = "0.0.0"
description = "PyGinkgo is a Python binding for the Ginkgo framework, providing access to Ginkgo's powerful linear algebra capabilities from Python."
authors = [
    {name = "Gregor Olenik", email = "go@hpsim.de"},
    {name = "Lukas Petermann", email = "lukas.petermann13@gmail.com"}
]
license = {text = "BSD-2-Clause"}
readme="Readme.md"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
requires-python = ">=3.8"
dependencies = [
]

[project_urls]
Documentation= "https://obr.readthedocs.io/"
Changelog= "https://obr.readthedocs.io/en/latest/changelog.html"
Issues= "https://github.com/hpsim/obr/issues"

[project.optional-dependencies]
test = [
    "pytest",
]
